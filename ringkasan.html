<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <title>Weekly Summary Wahidah</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons (Optional, using text for now if not available, but let's try a CDN for arrows) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1e272e;
            overflow-x: hidden;
            color: white;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 15px 20px;
            z-index: 1000;
        }

        .hamburger {
            width: 25px;
            height: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            height: 3px;
            background: #ffffff;
            border-radius: 3px;
            transition: 0.3s;
        }

        .nav-menu {
            position: absolute;
            top: 60px;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 10px;
            padding: 15px 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
            min-width: 220px;
            z-index: 999;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .nav-menu a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            background: #ffffff;
            color: #2f3640;
        }

        .dropdown {
            position: relative;
        }

        .dropdown .dropdown-content {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 40px;
            left: 0;
            background: rgba(30, 39, 46, 0.98);
            padding: 10px 15px;
            border-radius: 8px;
            min-width: 200px;
            z-index: 1001;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dropdown .dropdown-content a {
            padding: 8px 10px;
        }

        /* HERO & GRID */
        .hero {
            min-height: 100vh;
            /* Sleek Dark Gradient Background */
            background: linear-gradient(135deg, #1e272e 0%, #0d1216 100%);
            position: relative;
            padding-top: 120px;
            padding-bottom: 80px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .content-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 95%;
            /* Expanded for fuller screen usage */
            padding: 20px;
            text-align: center;
        }

        .page-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 60px;
            color: transparent;
            background: linear-gradient(90deg, #ffffff, #fff, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            /* 5 Weeks in a row as requested */
            gap: 20px;
            width: 100%;
            padding: 10px;
        }

        @media (max-width: 1200px) {
            .week-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }

        /* NEON GLASS CARD DESIGN */
        .week-card {
            position: relative;
            height: 180px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Bouncy transition */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Background Number 'Watermark' */
        .card-bg-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            z-index: 0;
            transition: 0.4s;
        }

        .card-content {
            z-index: 2;
            text-align: center;
        }

        .week-label {
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .week-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            transition: 0.3s;
        }

        .arrow-icon {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #ffffff;
            opacity: 0;
            transform: translateX(-20px);
            transition: 0.4s;
        }

        /* HOVER EFFECTS */
        .week-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.05);
            border-color: #ffffff;
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.15);
        }

        .week-card:hover .card-bg-number {
            color: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%) scale(1.1);
        }

        .week-card:hover .week-label {
            color: #ffffff;
        }

        .week-card:hover .arrow-icon {
            opacity: 1;
            transform: translateX(0);
        }

        /* CARD ENTRANCE ANIMATION */
        .week-card {
            opacity: 0;
            animation: fadeUpCard 0.6s ease forwards;
        }

        @keyframes fadeUpCard {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stagger Loop generated in JS or manual helpers */
        .week-card:nth-child(even) {
            animation-delay: 0.1s;
        }

        .week-card:nth-child(odd) {
            animation-delay: 0.2s;
        }


        /* Particles Canvas */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Interactive Particles Canvas */
        #particles-interactive-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Behind content (z-index: 2) but above background */
            pointer-events: none;
            /* Let clicks pass through, but mousemove needs to be captured? Wait, if pointer-events is none, mousemove might not work on it directly. Usually mousemove is on window. */
        }




        /* 4. Custom Cyan Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #00d2d3;
            border-radius: 10px;
            border: 2px solid #000;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ffffff;
        }

        /* 5. Glowing Hover Menu Line */
        .nav-menu a {
            position: relative;
            overflow: hidden;
            background: transparent !important;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 100%;
            height: 3px;
            background: #00d2d3;
            transition: left 0.3s ease;
            box-shadow: 0 0 10px #00d2d3, 0 0 20px #00d2d3;
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            left: 0;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #00d2d3 !important;
            text-shadow: 0 0 8px rgba(0, 210, 211, 0.6);
        }

        /* Dropdown custom background */
        .dropdown .dropdown-content {
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid rgba(0, 210, 211, 0.3);
            box-shadow: 0 10px 30px rgba(0, 210, 211, 0.2);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
        <div class="nav-menu" id="navMenu">
            <a href="index.html">Home ??</a>
            <a href="pengenalan.html">Executive Summary</a>
            <a href="penghargaan.html">Dedications & Appreciation</a>
            <!-- Latar Belakang Single Link -->
            <a href="latar.html">Company Background</a>

            <!-- Ringkasan Mingguan Direct Link -->
            <a href="ringkasan.html" class="active">Weekly Summary</a>
            <a href="laporan.html">Technical Report</a>
            <a href="cadangan.html">Recommendations</a>
            <a href="kesimpulan.html">Conclusion</a>
            <a href="lampiran.html">References</a>
        </div>
    </nav>

    <section class="hero">
        <canvas id="particles-canvas"></canvas>
        <canvas id="particles-interactive-canvas"></canvas>
        <div class="content-container">
            <h1 class="page-title">Weekly Summary</h1>

            <div class="week-grid" id="grid">
                <!-- Generating 20 Cards -->
                <script>
                    let cardsHTML = '';
                    for (let i = 1; i <= 20; i++) {
                        // Pad number with 0 if < 10
                        let num = i < 10 ? '0' + i : i;

                        // Stagger animation delay
                        let delay = (i * 0.05).toFixed(2);

                        cardsHTML += `
                        <a href="minggu${i}.html" class="week-card" style="animation-delay: ${delay}s">
                            <div class="card-bg-number">${num}</div>
                            <div class="card-content">
                                <div class="week-label">Week</div>
                                <div class="week-number">${i}</div>
                                <div class="arrow-icon">View Report ?</div>
                            </div>
                        </a>
                        `;
                    }
                    document.getElementById('grid').innerHTML = cardsHTML;
                </script>
            </div>
        </div>
    </section>

    <!-- Admin JS -->
    <script src="admin.js"></script>

    <!-- Particle Script -->
    <script>
        window.addEventListener('click', e => { if (!e.target.closest('#navMenu') && !e.target.closest('.hamburger')) document.getElementById('navMenu').style.display = 'none'; if (!e.target.closest('.dropdown > a') && !e.target.closest('.dropdown-content')) document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none'); });

        // --- PARTICLE ANIMATION SCRIPT ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.directionX = (Math.random() * 1) - 0.5;
                this.directionY = (Math.random() * 1) - 0.5;
                this.size = (Math.random() * 3) + 1;
                this.color = '#00d2d3';
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) +
                        ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(0, 210, 211,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        init();
        animate();

        // --- INTERACTIVE PARTICLES SCRIPT (MINI CYAN SPARKS ONLY) ---
        (function () {
            const canvasInteractive = document.getElementById('particles-interactive-canvas');
            if (!canvasInteractive) return;
            const ctxInteractive = canvasInteractive.getContext('2d');
            canvasInteractive.width = window.innerWidth;
            canvasInteractive.height = window.innerHeight;

            // 1. Elegant Cyan Sparks (Exploding Dust)
            let sparks = [];
            let mouseInteractive = { x: null, y: null };
            let lastMouse = { x: null, y: null };

            const sparkColors = ['#00d2d3', '#ffffff', 'rgba(0, 210, 211, 0.7)'];

            window.addEventListener('mousemove', (e) => {
                lastMouse.x = mouseInteractive.x || e.clientX;
                lastMouse.y = mouseInteractive.y || e.clientY;

                mouseInteractive.x = e.clientX;
                mouseInteractive.y = e.clientY;

                // Calculate mouse speed
                const dx = mouseInteractive.x - lastMouse.x;
                const dy = mouseInteractive.y - lastMouse.y;
                const speed = Math.sqrt(dx * dx + dy * dy);

                // Spawn amount based on speed (min 1, max 8)
                const spawnCount = Math.min(Math.floor(speed / 5) + 1, 8);

                for (let i = 0; i < spawnCount; i++) {
                    sparks.push(new Spark(mouseInteractive.x, mouseInteractive.y, speed));
                }
            });

            class Spark {
                constructor(x, y, speed) {
                    this.x = x;
                    this.y = y;
                    this.size = Math.random() * 2.5 + 0.5; // Halus

                    // Speed multiplier makes them scatter more if mouse moves fast
                    const multiplier = Math.min(speed * 0.1, 5);

                    this.speedX = (Math.random() - 0.5) * multiplier * 2;
                    this.speedY = (Math.random() - 0.5) * multiplier * 2;

                    this.color = sparkColors[Math.floor(Math.random() * sparkColors.length)];
                    this.life = 100;
                    this.decay = Math.random() * 4 + 2; // Fast decay
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;

                    // Slow down over time
                    this.speedX *= 0.92;
                    this.speedY *= 0.92;

                    this.life -= this.decay;
                    if (this.size > 0.1) this.size -= 0.05; // Shrink
                }
                draw() {
                    ctxInteractive.beginPath();
                    ctxInteractive.arc(this.x, this.y, Math.max(this.size, 0.1), 0, Math.PI * 2);
                    ctxInteractive.fillStyle = this.color;
                    ctxInteractive.globalAlpha = Math.max(this.life / 100, 0);
                    ctxInteractive.shadowBlur = 10;
                    ctxInteractive.shadowColor = this.color;
                    ctxInteractive.fill();
                    ctxInteractive.globalAlpha = 1; // reset
                }
            }

            function animateInteractive() {
                ctxInteractive.clearRect(0, 0, canvasInteractive.width, canvasInteractive.height);

                // -- Update & Lukis Sparks --
                for (let i = 0; i < sparks.length; i++) {
                    sparks[i].update();
                    sparks[i].draw();

                    // Buang spark yang dah mati (life <= 0)
                    if (sparks[i].life <= 0) {
                        sparks.splice(i, 1);
                        i--;
                    }
                }

                requestAnimationFrame(animateInteractive);
            }

            window.addEventListener('resize', () => {
                canvasInteractive.width = window.innerWidth;
                canvasInteractive.height = window.innerHeight;
            });

            animateInteractive();
        })();

    </script>
</body>

</html>
